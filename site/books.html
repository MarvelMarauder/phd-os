<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS — Books</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title">Books</p>
  <p class="page-sub">What I'm reading, have read, and want to read · hover a cover for details</p>

  <!-- Currently Reading -->
  <section id="reading-section" style="display:none">
    <h2>Currently Reading</h2>
    <div class="bookshelf-grid" id="reading-grid"></div>
  </section>

  <!-- Finished -->
  <section>
    <h2>Finished <span class="section-count" id="read-count"></span></h2>
    <div class="bookshelf-grid" id="read-grid"><p class="loading">Loading…</p></div>
  </section>

  <!-- Want to Read -->
  <section id="want-section" style="display:none">
    <h2>Want to Read <span class="section-count" id="want-count"></span></h2>
    <div class="bookshelf-grid" id="want-grid"></div>
  </section>
</main>

<script src="app.js"></script>
<script>
document.getElementById('nav').innerHTML = navHTML('books');
initSettings();

const COVER_COLORS = [
  '#b04820','#2a7a50','#2c5fa0','#7040a8','#c07808',
  '#c0392b','#16a085','#8e44ad','#2980b9','#e67e22',
  '#27ae60','#d35400','#1a5276','#884ea0','#b7950b',
];

function placeholderColor(title) {
  let h = 0;
  for (const c of (title || '')) h = ((h * 31) + c.charCodeAt(0)) >>> 0;
  return COVER_COLORS[h % COVER_COLORS.length];
}

function ratingDots(r) {
  if (!r) return '';
  const n = Math.round(Number(r));
  return `<div class="book-spine-rating">` +
    Array.from({length: 5}, (_, i) =>
      `<span class="rating-pip${i < n ? ' filled' : ''}"></span>`
    ).join('') + `</div>`;
}

function formatBookDate(s) {
  if (!s || s === 'yes') return '';
  const d = new Date(s + 'T12:00:00');
  return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function bookSpineHtml(b, opts = {}) {
  const isCurrently = b.status === 'currently-reading' || b.status === 'reading';
  const startedStr  = formatBookDate(b.started);
  const finishedStr = formatBookDate(b.finished);
  const color       = placeholderColor(b.title);
  const initial     = (b.title || '?')[0].toUpperCase();

  const coverInner = b.cover_url
    ? `<img class="book-cover-img" src="${escHtml(b.cover_url)}"
           alt="${escHtml(b.title)}" data-title="${escHtml(b.title)}">`
    : `<div class="book-cover-placeholder" style="background:${color}">${initial}</div>`;

  const popupMeta = [
    b.started === 'yes' && !startedStr ? '<div class="book-popup-date">Currently reading</div>' : '',
    startedStr  ? `<div class="book-popup-date">Started ${startedStr}</div>` : '',
    finishedStr ? `<div class="book-popup-date">Finished ${finishedStr}</div>` : '',
  ].filter(Boolean).join('');

  const popupTags = (b.tags || []).length
    ? `<div class="book-tags">${b.tags.map(t => `<span class="book-tag">${escHtml(t)}</span>`).join('')}</div>`
    : '';

  return `
    <div class="book-spine${isCurrently ? ' book-spine-current' : ''}">
      <div class="book-cover-wrap">
        ${coverInner}
        <div class="book-popup">
          <div class="book-popup-title">${escHtml(b.title)}</div>
          <div class="book-popup-author">${escHtml(b.author)}</div>
          ${opts.showRating && b.rating ? `<div class="book-popup-rating">${ratingDots(b.rating)}</div>` : ''}
          ${popupMeta}
          ${b.snippet ? `<p class="book-popup-snippet">${escHtml(b.snippet)}</p>` : ''}
          ${popupTags}
        </div>
      </div>
      <div class="book-spine-meta">
        <div class="book-spine-title">${escHtml(b.title)}</div>
        ${opts.showRating ? ratingDots(b.rating) : ''}
      </div>
    </div>`;
}

function renderGrid(gridId, books, opts = {}) {
  const el = document.getElementById(gridId);
  if (!books.length) { el.innerHTML = '<p class="empty">Nothing here yet.</p>'; return; }
  el.innerHTML = books.map(b => bookSpineHtml(b, opts)).join('');

  // Wire up cover image error → fallback to placeholder
  el.querySelectorAll('.book-cover-img').forEach(img => {
    img.addEventListener('error', function() {
      const color = placeholderColor(this.dataset.title);
      const ph = document.createElement('div');
      ph.className = 'book-cover-placeholder';
      ph.style.background = color;
      ph.textContent = (this.dataset.title || '?')[0].toUpperCase();
      this.replaceWith(ph);
    });
  });
}

async function loadBooks() {
  try {
    const data  = await fetch('books.json').then(r => r.json());
    const books = data.books || [];

    const reading  = books.filter(b => b.status === 'currently-reading' || b.status === 'reading');
    const finished = books.filter(b => b.status === 'read' || b.status === 'finished');
    const want     = books.filter(b => b.status === 'want-to-read');

    // Currently Reading
    const readingSection = document.getElementById('reading-section');
    if (reading.length) {
      readingSection.style.display = '';
      renderGrid('reading-grid', reading);
    }

    // Finished
    finished.sort((a, b) => (b.finished || '').localeCompare(a.finished || '') || a.title.localeCompare(b.title));
    document.getElementById('read-count').textContent = finished.length || '';
    if (finished.length) {
      renderGrid('read-grid', finished, { showRating: true });
    } else {
      document.getElementById('read-grid').innerHTML = '<p class="empty">No finished books yet.</p>';
    }

    // Want to Read
    const wantSection = document.getElementById('want-section');
    document.getElementById('want-count').textContent = want.length || '';
    if (want.length) {
      wantSection.style.display = '';
      renderGrid('want-grid', want);
    }

  } catch(e) {
    document.getElementById('read-grid').innerHTML = '<p class="error">Could not load books.json</p>';
  }
}

loadBooks();
</script>
</body>
</html>
