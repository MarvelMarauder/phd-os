<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS — Books</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title">Books</p>
  <p class="page-sub">What I'm reading, have read, and want to read · hover a cover for details</p>

  <!-- ── Quick Add ──────────────────────────────────── -->
  <section>
    <h2>Quick Add</h2>
    <div class="doi-form" id="bqa-form">

      <div class="book-search-row">
        <input class="form-input" type="text" id="bqa-title"
               placeholder="Book title…" autocomplete="off" spellcheck="false">
        <input class="form-input" type="text" id="bqa-author"
               placeholder="Author (optional)" autocomplete="off" spellcheck="false">
        <button class="btn btn-primary" id="bqa-search-btn">Search</button>
      </div>
      <div id="bqa-status"></div>

      <!-- Edition picker -->
      <div id="bqa-editions" class="hidden">
        <p class="bqa-step-label">Pick your edition — covers are edition-specific:</p>
        <div class="bqa-ed-grid" id="bqa-ed-grid"></div>
      </div>

      <!-- Form fields (shown after edition selected) -->
      <div id="bqa-fields" class="doi-fields hidden">
        <div id="bqa-preview-wrap"></div>

        <div class="form-row">
          <div class="form-field" style="flex:3">
            <label class="form-label">Title <span class="form-hint">editable</span></label>
            <input class="form-input" type="text" id="bqa-f-title">
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Author <span class="form-hint">editable</span></label>
          <input class="form-input" type="text" id="bqa-f-author">
        </div>
        <div class="form-row">
          <div class="form-field">
            <label class="form-label">Status</label>
            <select class="form-input" id="bqa-f-status">
              <option value="want-to-read">Want to Read</option>
              <option value="currently-reading">Currently Reading</option>
              <option value="read">Read</option>
            </select>
          </div>
          <div class="form-field">
            <label class="form-label">Rating</label>
            <div class="bqa-rating-row" id="bqa-rating-row">
              <button class="bqa-rating-pill" data-val="1">★</button>
              <button class="bqa-rating-pill" data-val="2">★★</button>
              <button class="bqa-rating-pill" data-val="3">★★★</button>
              <button class="bqa-rating-pill" data-val="4">★★★★</button>
              <button class="bqa-rating-pill" data-val="5">★★★★★</button>
            </div>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Tags</label>
          <div class="bqa-tags-row">
            <label class="bqa-tag-chip"><input type="checkbox" value="fiction"> fiction</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="nonfiction"> nonfiction</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="self-help"> self-help</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="psychology"> psychology</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="research"> research</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="history"> history</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="biography"> biography</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="horror"> horror</label>
            <label class="bqa-tag-chip"><input type="checkbox" value="spiritual"> spiritual</label>
          </div>
        </div>

        <input type="hidden" id="bqa-f-isbn">
        <input type="hidden" id="bqa-f-coverurl">

        <div class="doi-actions" style="margin-top:18px">
          <button class="btn btn-primary" id="bqa-copy-btn">Copy frontmatter</button>
        </div>
        <div class="doi-copy-hint">
          Paste into a new note in <code>400 Personal/Books/</code> and push to main.
        </div>
      </div>

    </div>
  </section>

  <!-- Currently Reading -->
  <section id="reading-section" style="display:none">
    <h2>Currently Reading</h2>
    <div class="bookshelf-grid" id="reading-grid"></div>
  </section>

  <!-- Finished -->
  <section>
    <h2>Finished <span class="section-count" id="read-count"></span></h2>
    <div class="bookshelf-grid" id="read-grid"><p class="loading">Loading…</p></div>
  </section>

  <!-- Want to Read -->
  <section id="want-section" style="display:none">
    <h2>Want to Read <span class="section-count" id="want-count"></span></h2>
    <div class="bookshelf-grid" id="want-grid"></div>
  </section>
</main>

<script src="app.js"></script>
<script>
document.getElementById('nav').innerHTML = navHTML('books');
initSettings();

// ── Quick Add ─────────────────────────────────────────
let bqaRating = null;

document.getElementById('bqa-search-btn').addEventListener('click', bqaSearch);
document.getElementById('bqa-title').addEventListener('keydown', e => { if (e.key === 'Enter') bqaSearch(); });

document.getElementById('bqa-rating-row').addEventListener('click', e => {
  const btn = e.target.closest('.bqa-rating-pill');
  if (!btn) return;
  bqaRating = bqaRating === Number(btn.dataset.val) ? null : Number(btn.dataset.val);
  document.querySelectorAll('.bqa-rating-pill').forEach(b => {
    b.classList.toggle('active', Number(b.dataset.val) === bqaRating);
  });
});

document.getElementById('bqa-copy-btn').addEventListener('click', () => {
  const title    = document.getElementById('bqa-f-title').value.trim();
  const author   = document.getElementById('bqa-f-author').value.trim();
  const isbn     = document.getElementById('bqa-f-isbn').value.trim();
  const coverUrl = document.getElementById('bqa-f-coverurl').value.trim();
  const status   = document.getElementById('bqa-f-status').value;
  const tags     = [...document.querySelectorAll('.bqa-tag-chip input:checked')].map(i => i.value);
  const rating   = bqaRating ? '"' + '*'.repeat(bqaRating) + '"' : '';
  const tagsYaml = tags.length ? '\ntags:\n' + tags.map(t => `  - ${t}`).join('\n') : '\ntags:';

  const yaml = `---\ntitle: ${title}\nauthor: ${author}\nstatus: ${status}\nrating: ${rating}\nstarted:\nfinished:\nisbn: ${isbn}\ncover_url: ${coverUrl}${tagsYaml}\n---\n`;

  navigator.clipboard.writeText(yaml).then(() => {
    const btn = document.getElementById('bqa-copy-btn');
    btn.textContent = 'Copied ✓';
    btn.style.background = 'var(--accent)';
    setTimeout(() => { btn.textContent = 'Copy frontmatter'; btn.style.background = ''; }, 2500);
  });
});

async function bqaSearch() {
  const title  = document.getElementById('bqa-title').value.trim();
  const author = document.getElementById('bqa-author').value.trim();
  const statusEl = document.getElementById('bqa-status');
  if (!title) { statusEl.innerHTML = '<p class="error" style="margin-top:6px">Enter a book title.</p>'; return; }

  statusEl.innerHTML = '<p class="loading" style="margin-top:6px">Searching Open Library…</p>';
  document.getElementById('bqa-editions').classList.add('hidden');
  document.getElementById('bqa-fields').classList.add('hidden');

  try {
    const t = encodeURIComponent(title);
    const a = author ? `&author=${encodeURIComponent(author)}` : '';
    const r = await fetch(`https://openlibrary.org/search.json?title=${t}${a}&limit=4&fields=key,title,author_name,cover_i`);
    const { docs = [] } = await r.json();

    if (!docs.length) { statusEl.innerHTML = '<p class="error" style="margin-top:6px">No results found — try a shorter title.</p>'; return; }

    statusEl.innerHTML = '<p class="loading" style="margin-top:6px">Loading editions…</p>';

    // Fetch editions from top 3 matching works in parallel
    const groups = await Promise.allSettled(
      docs.slice(0, 3).map(work => {
        const key = work.key.replace('/works/', '');
        return fetch(`https://openlibrary.org/works/${key}/editions.json?limit=20`)
          .then(r => r.json())
          .then(d => (d.entries || []).map(e => ({
            ...e,
            _workTitle:   work.title,
            _workAuthors: work.author_name || [],
            _workCoverId: work.cover_i,
          })));
      })
    );

    const allEditions = groups
      .filter(g => g.status === 'fulfilled')
      .flatMap(g => g.value)
      .filter(e => (e.isbn_13 || e.isbn_10 || []).length)   // must have an ISBN
      .sort((a, b) => {
        const ya = parseInt((a.publish_date || '').match(/\d{4}/)?.[0] || '0');
        const yb = parseInt((b.publish_date || '').match(/\d{4}/)?.[0] || '0');
        return yb - ya;  // newest first
      });

    if (!allEditions.length) {
      statusEl.innerHTML = '<p class="error" style="margin-top:6px">Found the book but no editions with ISBNs. Try adding ISBN manually.</p>';
      return;
    }

    statusEl.innerHTML = '';
    bqaShowEditions(allEditions);
  } catch(e) {
    statusEl.innerHTML = '<p class="error" style="margin-top:6px">Search failed — check connection.</p>';
  }
}

function bqaShowEditions(editions) {
  const grid = document.getElementById('bqa-ed-grid');
  grid.innerHTML = editions.map((ed, i) => {
    const coverId  = (ed.covers || [])[0] || ed._workCoverId;
    const coverSrc = coverId ? `https://covers.openlibrary.org/b/id/${coverId}-M.jpg` : '';
    const isbn     = (ed.isbn_13 || ed.isbn_10 || [])[0] || '';
    const year     = (ed.publish_date || '').match(/\d{4}/)?.[0] || '';
    const pub      = (ed.publishers || [])[0] || '';
    const initial  = (ed._workTitle || '?')[0].toUpperCase();

    return `
      <div class="bqa-ed-card" data-idx="${i}">
        ${coverSrc ? `<img class="bqa-ed-cover" src="${escHtml(coverSrc)}"
             alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ''}
        <div class="bqa-ed-cover-ph" style="${coverSrc ? 'display:none' : ''}">${initial}</div>
        ${year ? `<div class="bqa-ed-year">${year}</div>` : ''}
        ${pub  ? `<div class="bqa-ed-pub">${escHtml(pub.length > 22 ? pub.slice(0,20) + '…' : pub)}</div>` : ''}
        ${isbn ? `<div class="bqa-ed-isbn">${escHtml(isbn)}</div>` : ''}
      </div>`;
  }).join('');

  document.getElementById('bqa-editions').classList.remove('hidden');

  grid.querySelectorAll('.bqa-ed-card').forEach(card => {
    card.addEventListener('click', () => {
      grid.querySelectorAll('.bqa-ed-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      bqaSelectEdition(editions[parseInt(card.dataset.idx)]);
    });
  });
}

function bqaSelectEdition(ed) {
  const coverId  = (ed.covers || [])[0] || ed._workCoverId;
  const isbn     = (ed.isbn_13 || ed.isbn_10 || [])[0] || '';
  const year     = (ed.publish_date || '').match(/\d{4}/)?.[0] || '';
  const title    = ed._workTitle || '';
  const author   = ed._workAuthors.join(', ');
  const coverUrl = coverId ? `https://covers.openlibrary.org/b/id/${coverId}-L.jpg` : '';
  const pub      = (ed.publishers || [])[0] || '';

  const coverHtml = coverUrl
    ? `<img class="bqa-preview-cover" src="${escHtml(coverUrl)}" alt="${escHtml(title)}">`
    : `<div class="bqa-preview-cover-ph">${escHtml(title[0]?.toUpperCase() || '?')}</div>`;

  document.getElementById('bqa-preview-wrap').innerHTML = `
    <div class="bqa-preview">
      ${coverHtml}
      <div class="bqa-preview-meta">
        <div class="bqa-preview-title">${escHtml(title)}</div>
        <div class="bqa-preview-sub">${escHtml(author)}</div>
        ${year ? `<div class="bqa-preview-sub">${year}${pub ? ' · ' + escHtml(pub) : ''}</div>` : ''}
        ${isbn ? `<div class="bqa-preview-sub" style="font-family:monospace;font-size:11px">ISBN ${escHtml(isbn)}</div>` : ''}
      </div>
    </div>`;

  document.getElementById('bqa-f-title').value    = title;
  document.getElementById('bqa-f-author').value   = author;
  document.getElementById('bqa-f-isbn').value     = isbn;
  document.getElementById('bqa-f-coverurl').value = coverUrl;
  bqaRating = null;
  document.querySelectorAll('.bqa-rating-pill').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.bqa-tag-chip input').forEach(i => { i.checked = false; });

  const fields = document.getElementById('bqa-fields');
  fields.classList.remove('hidden');
  setTimeout(() => fields.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
}

const COVER_COLORS = [
  '#b04820','#2a7a50','#2c5fa0','#7040a8','#c07808',
  '#c0392b','#16a085','#8e44ad','#2980b9','#e67e22',
  '#27ae60','#d35400','#1a5276','#884ea0','#b7950b',
];

// Only allow http/https URLs in src attributes — blocks javascript: and data: schemes.
function safeSrc(url) {
  if (!url) return '';
  try {
    const u = new URL(url);
    return (u.protocol === 'https:' || u.protocol === 'http:') ? url : '';
  } catch { return ''; }
}

function placeholderColor(title) {
  let h = 0;
  for (const c of (title || '')) h = ((h * 31) + c.charCodeAt(0)) >>> 0;
  return COVER_COLORS[h % COVER_COLORS.length];
}

function ratingDots(r) {
  if (!r) return '';
  const n = Math.round(Number(r));
  return `<div class="book-spine-rating">` +
    Array.from({length: 5}, (_, i) =>
      `<span class="rating-pip${i < n ? ' filled' : ''}"></span>`
    ).join('') + `</div>`;
}

function formatBookDate(s) {
  if (!s || s === 'yes') return '';
  const d = new Date(s + 'T12:00:00');
  return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function bookSpineHtml(b, opts = {}) {
  const isCurrently = b.status === 'currently-reading' || b.status === 'reading';
  const startedStr  = formatBookDate(b.started);
  const finishedStr = formatBookDate(b.finished);
  const color       = placeholderColor(b.title);
  const initial     = (b.title || '?')[0].toUpperCase();

  // Always start with placeholder; cover gets fetched async by loadCovers()
  const safeUrl = safeSrc(b.cover_url);
  const coverInner = safeUrl
    ? `<img class="book-cover-img" src="${escHtml(safeUrl)}"
           alt="${escHtml(b.title)}" data-title="${escHtml(b.title)}">`
    : `<div class="book-cover-placeholder" style="background:${color}">${initial}</div>`;

  const popupMeta = [
    b.started === 'yes' && !startedStr ? '<div class="book-popup-date">Currently reading</div>' : '',
    startedStr  ? `<div class="book-popup-date">Started ${startedStr}</div>` : '',
    finishedStr ? `<div class="book-popup-date">Finished ${finishedStr}</div>` : '',
  ].filter(Boolean).join('');

  const popupTags = (b.tags || []).length
    ? `<div class="book-tags">${b.tags.map(t => `<span class="book-tag">${escHtml(t)}</span>`).join('')}</div>`
    : '';

  return `
    <div class="book-spine${isCurrently ? ' book-spine-current' : ''}"
         data-cover-isbn="${escHtml(b.isbn||'')}"
         data-cover-title="${escHtml(b.title)}"
         data-cover-author="${escHtml(b.author||'')}"
         ${safeUrl ? 'data-cover-loaded="1"' : ''}>
      <div class="book-cover-wrap">
        ${coverInner}
        <div class="book-popup">
          <div class="book-popup-title">${escHtml(b.title)}</div>
          <div class="book-popup-author">${escHtml(b.author)}</div>
          ${opts.showRating && b.rating ? `<div class="book-popup-rating">${ratingDots(b.rating)}</div>` : ''}
          ${popupMeta}
          ${b.snippet ? `<p class="book-popup-snippet">${escHtml(b.snippet)}</p>` : ''}
          ${popupTags}
        </div>
      </div>
      <div class="book-spine-meta">
        <div class="book-spine-title">${escHtml(b.title)}</div>
        ${opts.showRating ? ratingDots(b.rating) : ''}
      </div>
    </div>`;
}

function renderGrid(gridId, books, opts = {}) {
  const el = document.getElementById(gridId);
  if (!books.length) { el.innerHTML = '<p class="empty">Nothing here yet.</p>'; return; }
  el.innerHTML = books.map(b => bookSpineHtml(b, opts)).join('');

  // Wire up cover image error → fallback to placeholder
  el.querySelectorAll('.book-cover-img').forEach(img => {
    img.addEventListener('error', function() {
      const color = placeholderColor(this.dataset.title);
      const ph = document.createElement('div');
      ph.className = 'book-cover-placeholder';
      ph.style.background = color;
      ph.textContent = (this.dataset.title || '?')[0].toUpperCase();
      this.replaceWith(ph);
    });
  });
}

async function loadBooks() {
  try {
    const data  = await fetch('books.json').then(r => r.json());
    const books = data.books || [];

    const reading  = books.filter(b => b.status === 'currently-reading' || b.status === 'reading');
    const finished = books.filter(b => b.status === 'read' || b.status === 'finished');
    const want     = books.filter(b => b.status === 'want-to-read');

    // Currently Reading
    const readingSection = document.getElementById('reading-section');
    if (reading.length) {
      readingSection.style.display = '';
      renderGrid('reading-grid', reading);
    }

    // Finished
    finished.sort((a, b) => (b.finished || '').localeCompare(a.finished || '') || a.title.localeCompare(b.title));
    document.getElementById('read-count').textContent = finished.length || '';
    if (finished.length) {
      renderGrid('read-grid', finished, { showRating: true });
    } else {
      document.getElementById('read-grid').innerHTML = '<p class="empty">No finished books yet.</p>';
    }

    // Want to Read
    const wantSection = document.getElementById('want-section');
    document.getElementById('want-count').textContent = want.length || '';
    if (want.length) {
      wantSection.style.display = '';
      renderGrid('want-grid', want);
    }

  } catch(e) {
    document.getElementById('read-grid').innerHTML = '<p class="error">Could not load books.json</p>';
  }
}

// After all grids render, fetch covers client-side from Google Books
async function loadCovers() {
  const spines = document.querySelectorAll('.book-spine:not([data-cover-loaded])');
  for (const spine of spines) {
    const { coverIsbn: isbn, coverTitle: title, coverAuthor: author } = spine.dataset;
    if (!title) continue;
    const url = await fetchBookCover(isbn || '', title, author || '');
    if (!url) continue;
    const wrap = spine.querySelector('.book-cover-wrap');
    if (!wrap) continue;
    const ph = wrap.querySelector('.book-cover-placeholder');
    if (!ph) continue;
    const img = document.createElement('img');
    img.className = 'book-cover-img';
    img.alt = title;
    img.dataset.title = title;
    img.style.opacity = '0';
    img.style.transition = 'opacity 0.4s ease';
    img.addEventListener('load',  () => { img.style.opacity = '1'; });
    img.addEventListener('error', () => {
      img.replaceWith(ph);
    });
    img.src = url;
    ph.replaceWith(img);
    spine.setAttribute('data-cover-loaded', '1');
  }
}

loadBooks().then(loadCovers);
</script>
</body>
</html>
