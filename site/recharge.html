<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS — Recharge</title>
  <script src="theme.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title">Recharge</p>
  <p class="page-sub">Start a timer, do the thing, log it.</p>

  <!-- ── Active timer (shown when running) ────────────── -->
  <section id="rc-active-section" style="display:none">
    <div class="rc-timer-card">
      <div class="rc-timer-meta">
        <span class="rc-timer-cat"  id="rc-timer-cat"></span>
        <span class="rc-timer-sep">·</span>
        <span class="rc-timer-name" id="rc-timer-name"></span>
      </div>
      <div class="rc-timer-display" id="rc-timer-display">00:00</div>
      <div class="rc-timer-actions">
        <button class="btn btn-primary" id="rc-stop-btn">Stop &amp; Log</button>
        <button class="btn btn-ghost"   id="rc-cancel-btn">Cancel</button>
      </div>
    </div>
  </section>

  <!-- ── Browse activities ────────────────────────────── -->
  <section>
    <h2>Activities</h2>
    <div id="rc-browse">
      <p class="loading">Loading…</p>
    </div>
  </section>

  <!-- ── Today's sessions ─────────────────────────────── -->
  <section>
    <h2>Today</h2>
    <div id="rc-today">
      <p class="empty">Nothing logged yet today.</p>
    </div>
  </section>

</main>

<script src="app.js"></script>
<script>
document.getElementById('nav').innerHTML = navHTML('recharge');
initSettings();

let allData    = null;
let timerTick  = null;

// ── Timer display ─────────────────────────────────────
function updateTimerDisplay() {
  const active = getRechargeActive();
  if (!active) return;
  const elapsed = Math.round((Date.now() - new Date(active.startedAt).getTime()) / 1000);
  document.getElementById('rc-timer-display').textContent = formatElapsed(elapsed);
}

function startTick() {
  clearInterval(timerTick);
  timerTick = setInterval(updateTimerDisplay, 1000);
}

// ── Active section ────────────────────────────────────
function renderActiveSection() {
  const active  = getRechargeActive();
  const section = document.getElementById('rc-active-section');
  if (!active) {
    section.style.display = 'none';
    clearInterval(timerTick);
    return;
  }
  section.style.display = '';
  document.getElementById('rc-timer-cat').textContent  = active.category;
  document.getElementById('rc-timer-name').textContent = active.item;
  updateTimerDisplay();
  startTick();
}

// ── Stop / cancel ─────────────────────────────────────
document.getElementById('rc-stop-btn').addEventListener('click', () => {
  const active = getRechargeActive();
  if (!active) return;
  const endedAt = new Date().toISOString();
  addRechargeSession(active.item, active.category, active.startedAt, endedAt);
  clearRechargeActive();
  renderActiveSection();
  renderToday();
});

document.getElementById('rc-cancel-btn').addEventListener('click', () => {
  if (!confirm('Discard this break without logging?')) return;
  clearRechargeActive();
  renderActiveSection();
});

// ── Start activity ────────────────────────────────────
function startActivity(item, category) {
  const active = getRechargeActive();
  if (active && (active.item !== item || active.category !== category)) {
    if (!confirm(`Switch break to "${item}"?\n\nCurrent session will be discarded.`)) return;
  }
  saveRechargeActive({ item, category, startedAt: new Date().toISOString() });
  renderActiveSection();
  renderBrowse(); // refresh button states
}

// ── Browse section ────────────────────────────────────
function renderBrowse() {
  const el = document.getElementById('rc-browse');
  if (!allData?.sections?.length) {
    el.innerHTML = `
      <p class="empty">No activities yet.</p>
      <p style="font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.7">
        Open <strong>500 Recharge/Recharge List.md</strong> in Obsidian and add items under headings.
      </p>`;
    return;
  }

  const active = getRechargeActive();
  el.innerHTML = allData.sections.filter(s => s.items.length).map(s => `
    <div class="rc-category">
      <div class="rc-cat-label">${escHtml(s.title)}</div>
      <ul class="rc-activity-list">
        ${s.items.map(item => {
          const isCurrent = active && active.item === item && active.category === s.title;
          return `
          <li class="rc-activity-item${isCurrent ? ' rc-activity-active' : ''}">
            <span class="rc-activity-name">${escHtml(item)}</span>
            <button class="rc-start-btn${isCurrent ? ' rc-start-active' : ''}"
                    data-item="${escHtml(item)}" data-cat="${escHtml(s.title)}">
              ${isCurrent ? 'Active' : 'Start'}
            </button>
          </li>`;
        }).join('')}
      </ul>
    </div>`).join('');

  el.querySelectorAll('.rc-start-btn:not(.rc-start-active)').forEach(btn => {
    btn.addEventListener('click', () => startActivity(btn.dataset.item, btn.dataset.cat));
  });
}

// ── Today's sessions ──────────────────────────────────
function renderToday() {
  const el         = document.getElementById('rc-today');
  const log        = getRechargeLog();
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const entries    = log.filter(e => new Date(e.endedAt) >= todayStart);

  if (!entries.length) {
    el.innerHTML = '<p class="empty">Nothing logged yet today.</p>';
    return;
  }

  const totalSecs = entries.reduce((sum, e) => sum + e.duration, 0);
  const totalMins = Math.round(totalSecs / 60);

  el.innerHTML = `
    <div class="rc-today-summary">${entries.length} session${entries.length!==1?'s':''} · ${totalMins} min total</div>
    <ul class="rc-session-list">
      ${entries.map((e, idx) => {
        const mins = Math.round(e.duration / 60);
        const t    = new Date(e.endedAt).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
        return `
        <li class="rc-session-item">
          <span class="rc-entry-cat">${escHtml(e.category)}</span>
          <span class="rc-session-name">${escHtml(e.item)}</span>
          <span class="rc-session-dur">${mins}m</span>
          <span class="rc-session-time">${t}</span>
          <button class="rc-remove-btn" data-idx="${idx}" aria-label="Remove">×</button>
        </li>`;
      }).join('')}
    </ul>`;

  el.querySelectorAll('.rc-remove-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const log  = getRechargeLog();
      const todayEntries = log.filter((e,i) => {
        return new Date(e.endedAt) >= todayStart;
      });
      // Map today idx back to full log idx
      const allIdx = log.indexOf(todayEntries[parseInt(btn.dataset.idx)]);
      if (allIdx !== -1) { log.splice(allIdx, 1); saveRechargeLog(log); }
      renderToday();
    });
  });
}

// ── Init ──────────────────────────────────────────────
async function init() {
  try {
    allData = await fetch('recharge.json').then(r => r.json());
  } catch(e) {
    document.getElementById('rc-browse').innerHTML = '<p class="error">Could not load recharge.json.</p>';
  }
  renderActiveSection();
  renderBrowse();
  renderToday();
}

init();
</script>
</body>
</html>
