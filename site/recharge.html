<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS — Recharge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title">Recharge</p>
  <p class="page-sub">Things worth doing for their own sake</p>

  <div id="recharge-content">
    <p class="loading">Loading…</p>
  </div>

  <p style="font-size:12px;color:var(--text-subtle);margin-top:32px;">
    Edit your lists in <code>500 Recharge/Recharge List.md</code> — changes appear after the next push to main.
  </p>
</main>

<script src="app.js"></script>
<script>
document.getElementById('nav').innerHTML = navHTML('recharge');
initSettings();

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadRecharge() {
  const el = document.getElementById('recharge-content');
  try {
    const data = await fetch('recharge.json').then(r => r.json());
    const sections = data.sections.filter(s => s.items.length);

    if (!sections.length) {
      el.innerHTML = `
        <p class="empty">No recharge items yet.</p>
        <p style="font-size:13px;color:var(--text-muted);margin-top:8px;line-height:1.6">
          Open <strong>500 Recharge/Recharge List.md</strong> in Obsidian and add items under headings like:<br><br>
          <code>## DS Games</code><br>
          <code>- Breath of the Wild</code><br><br>
          After the next push to main, they'll appear here.
        </p>`;
      return;
    }

    el.innerHTML = sections.map(s => `
      <div class="recharge-section">
        <div class="recharge-heading">${escHtml(s.title)}</div>
        <ul class="recharge-items">
          ${s.items.map(item => `<li>${escHtml(item)}</li>`).join('')}
        </ul>
      </div>`).join('');

  } catch(e) {
    el.innerHTML = '<p class="error">Could not load recharge.json</p>';
  }
}

loadRecharge();
</script>
</body>
</html>
