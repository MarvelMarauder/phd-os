<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS — Discover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title">Discover</p>
  <p class="page-sub">Recent & trending papers from top IS journals · hover a title for details · papers already in your library are hidden</p>

  <section>
    <h2>
      Papers
      <button class="lit-refresh-btn" id="discover-refresh" title="Refresh results">↻</button>
    </h2>
    <div id="discover-area"></div>
  </section>
</main>

<script src="app.js"></script>
<script>
document.getElementById('nav').innerHTML = navHTML('lit');
initSettings();

const STREAM_META = {
  'ai-companions': { label: 'AI Companions', cls: 'stream-aic' },
  'judgy-ai':      { label: 'JudgyAI',       cls: 'stream-jai' },
  'general-is':    { label: 'General IS',    cls: 'stream-gis' },
};

// ── Library DOI filter ────────────────────────────────
let libraryDois = new Set();

async function loadLibraryDois() {
  try {
    const data = await fetch('lit.json').then(r => r.json());
    libraryDois = new Set(
      (data.papers || []).map(p => (p.doi || '').toLowerCase().trim()).filter(Boolean)
    );
  } catch(e) { /* silent — just don't filter */ }
}

// ── Todoist — Save to Readings ───────────────────────
let _readingsProjectId = null;

async function getReadingsProjectId() {
  if (_readingsProjectId) return _readingsProjectId;
  const projects = await fetchProjects();
  const proj = projects.find(p => p.name.toLowerCase() === 'readings');
  _readingsProjectId = proj ? proj.id : null;
  return _readingsProjectId;
}

async function saveToReadings(btn, title, doi) {
  if (!hasToken()) {
    showTokenModal(async () => saveToReadings(btn, title, doi));
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const projId = await getReadingsProjectId();
    if (!projId) throw new Error('no_project');
    const description = doi ? `https://doi.org/${doi}` : '';
    await apiPost('/tasks', { content: title, project_id: projId, description });
    btn.textContent = 'Saved ✓';
    btn.classList.add('disc-todoist-saved');
  } catch(e) {
    btn.disabled = false;
    if (e.message === 'bad_token') {
      btn.textContent = '+ Readings';
      showTokenModal(async () => saveToReadings(btn, title, doi));
    } else if (e.message === 'no_project') {
      btn.textContent = 'Project not found';
    } else {
      btn.textContent = 'Failed — retry';
    }
  }
}

// ── Compact discover card ─────────────────────────────
function discoverCardHtml(p, cardCls) {
  const doi     = p.doi || '';
  const href    = doi ? `https://doi.org/${doi}` : '';
  const journal = p.journal || '';
  const abbrev  = p.journal_abbrev || '';
  const year    = p.year || '';
  const cites   = p.cited_by_count;

  const authors = (p.authors || []).slice(0, 4).map(name => {
    const parts = name.split(' ');
    return parts.length > 1 ? parts[parts.length - 1] + ', ' + parts[0][0] + '.' : name;
  }).join('; ') + ((p.authors || []).length > 4 ? ' et al.' : '');

  const dateDisplay = p.pub_date
    ? new Date(p.pub_date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', year: 'numeric' })
    : (year ? String(year) : '');

  const journalBadge = abbrev
    ? `<span class="discover-journal-badge">${escHtml(abbrev)}</span>`
    : (journal ? `<span class="discover-journal-badge">${escHtml(journal.slice(0, 24))}</span>` : '');

  const citeBadge = cites > 0
    ? `<span class="discover-cite-badge">${cites} cites</span>` : '';

  const abstract = p.abstract
    ? escHtml(p.abstract.trim().slice(0, 260)) + (p.abstract.length > 260 ? '…' : '')
    : '';

  const titleEl = href
    ? `<a class="discover-card-title" href="${escHtml(href)}" target="_blank" rel="noopener">${escHtml(p.title)}</a>`
    : `<span class="discover-card-title">${escHtml(p.title)}</span>`;

  // URL for → Library button (takes user to library.html with form pre-filled)
  const libParams = new URLSearchParams({
    title:   p.title,
    authors: (p.authors || []).join('; '),
    journal: journal,
    year:    String(year),
    doi:     doi,
  });

  return `
    <div class="discover-card ${cardCls}">
      <div class="disc-popup">
        <div class="discover-card-meta">${journalBadge}${citeBadge}${dateDisplay ? `<span class="discover-card-date">${escHtml(dateDisplay)}</span>` : ''}</div>
        ${authors ? `<div class="discover-card-authors">${escHtml(authors)}</div>` : ''}
        ${abstract ? `<p class="discover-card-abstract">${abstract}</p>` : ''}
      </div>
      <div class="disc-title-wrap">${titleEl}</div>
      <div class="discover-card-actions">
        <a class="discover-add-btn" href="library.html?${escHtml(libParams.toString())}">→ Library</a>
        <button class="disc-todoist-btn"
          data-title="${escHtml(p.title)}"
          data-doi="${escHtml(doi)}">+ Readings</button>
      </div>
    </div>`;
}

async function loadDiscover() {
  const area = document.getElementById('discover-area');
  area.innerHTML = '<p class="loading">Loading…</p>';
  try {
    const data = await fetch(`discover.json?t=${Date.now()}`).then(r => r.json());
    const { sections = [], fetched_at } = data;

    if (fetched_at) {
      const d = new Date(fetched_at);
      const label = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                  + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      document.getElementById('discover-refresh').title = `Last fetched: ${label} UTC`;
    }

    if (!sections.length) {
      area.innerHTML = '<p class="empty">No discovery results — check build logs.</p>';
      return;
    }

    area.innerHTML = sections.map(s => {
      let headerCls, cardCls;
      if (s.type === 'stream') {
        const meta = STREAM_META[s.stream] || {};
        headerCls = meta.cls || '';
        cardCls   = meta.cls || '';
      } else {
        headerCls = `disc-${s.type}`;
        cardCls   = `disc-${s.type}`;
      }

      // Filter papers already in library (matched by DOI)
      const papers = s.papers.filter(p => {
        const doi = (p.doi || '').toLowerCase().trim();
        return !doi || !libraryDois.has(doi);
      });

      const cards = papers.length
        ? papers.map(p => discoverCardHtml(p, cardCls)).join('')
        : '<p class="empty">All found papers are already in your library.</p>';

      return `
        <div class="discover-stream">
          <div class="discover-stream-hd ${headerCls}">
            <div class="stream-dot"></div>
            <span class="stream-label">${escHtml(s.label)}</span>
            <span class="section-count">${papers.length}</span>
          </div>
          <div class="discover-cards">${cards}</div>
        </div>`;
    }).join('');

    area.querySelectorAll('.disc-todoist-btn').forEach(btn => {
      btn.addEventListener('click', () => saveToReadings(btn, btn.dataset.title, btn.dataset.doi));
    });

  } catch(e) {
    area.innerHTML = '<p class="error">Could not load discover.json — push to main to generate it.</p>';
  }
}

document.getElementById('discover-refresh').addEventListener('click', loadDiscover);

// Load library DOIs first, then render (so filtering is applied on first paint)
loadLibraryDois().then(loadDiscover);
</script>
</body>
</html>
