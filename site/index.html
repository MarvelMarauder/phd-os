<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS</title>
  <link rel="stylesheet" href="style.css">
  <script async defer src="https://accounts.google.com/gsi/client" onload="gcalInit()"></script>
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title" id="date-display"></p>
  <p class="page-sub" id="day-display"></p>

  <section id="calendar-section">
    <h2>Today's Meetings</h2>
    <ul class="event-list" id="event-list">
      <li class="loading">Loading meetings…</li>
    </ul>
  </section>

  <section id="tasks-section">
    <h2>Today</h2>
    <ul class="task-list" id="task-list">
      <li class="loading">Loading tasks…</li>
    </ul>
  </section>

  <section id="upcoming-section">
    <h2>Next 7 Days</h2>
    <ul class="task-list" id="upcoming-list">
      <li class="loading">Loading…</li>
    </ul>
  </section>

  <section>
    <h2>Papers</h2>
    <div id="papers-summary">
      <p class="loading">Loading…</p>
    </div>
  </section>

</main>

<div id="token-modal-placeholder"></div>

<script src="app.js"></script>
<script>
// ── Nav ──────────────────────────────────────────────
document.getElementById('nav').innerHTML = navHTML('home');
initSettings();

// ── Date header ──────────────────────────────────────
const now = new Date();
document.getElementById('date-display').textContent =
  now.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
document.getElementById('day-display').textContent =
  now.toLocaleDateString('en-US', { weekday: 'long' });

async function loadTasks() {
  if (!hasToken()) {
    document.getElementById('task-list').innerHTML =
      '<li class="empty">Connect Todoist to see tasks.</li>';
    document.getElementById('upcoming-list').innerHTML = '';
    document.getElementById('upcoming-section').style.display = 'none';
    return;
  }

  try {
    const [all, reminders] = await Promise.all([fetchTasks(), fetchReminders()]);
    setApiStatus('connected');
    const reminderMap = buildReminderMap(reminders);

    const today    = all.filter(t => isDueNow(t));
    const upcoming = all.filter(t => isDueWithin(t, 7));

    renderTaskList('task-list', today, all, false, reminderMap);
    if (upcoming.length) {
      renderTaskList('upcoming-list', upcoming, all, true, reminderMap);
    } else {
      document.getElementById('upcoming-list').innerHTML =
        '<li class="empty">Nothing else this week.</li>';
    }
  } catch(e) {
    setApiStatus('error');
    if (e.message === 'bad_token') {
      document.getElementById('task-list').innerHTML =
        '<li class="error">Invalid token — click ⚙ to reset.</li>';
    } else {
      document.getElementById('task-list').innerHTML =
        '<li class="error">Could not reach Todoist. Check connection.</li>';
    }
    document.getElementById('upcoming-list').innerHTML = '';
  }
}

// ── Papers summary ────────────────────────────────────
async function loadPapers() {
  const el = document.getElementById('papers-summary');
  try {
    const data = await fetch('papers.json').then(r => r.json());
    const active = data.papers.filter(p => p.status === 'active');
    if (!active.length) { el.innerHTML = '<p class="empty">No active papers.</p>'; return; }

    el.innerHTML = active.map(p => {
      const si = stageIndex(p.stage);
      const steps = STAGES.map((_, i) => {
        if (i < si)  return '<div class="progress-step past"></div>';
        if (i === si) return '<div class="progress-step current"></div>';
        return '<div class="progress-step"></div>';
      }).join('');
      return `
        <div class="paper-card">
          <div class="paper-header">
            <span class="paper-title">${escHtml(p.title)}</span>
            <span class="stage-pill ${stageClass(p.stage)}">${p.stage}</span>
          </div>
          <div class="paper-progress">${steps}</div>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<p class="error">Could not load papers.json</p>';
  }
}

// ── Calendar ──────────────────────────────────────────
function renderEvents(events) {
  const el = document.getElementById('event-list');
  if (!events.length) {
    el.innerHTML = '<li class="empty">No meetings today.</li>';
    return;
  }
  el.innerHTML = events.map(e => {
    const allDay = !e.start.dateTime;
    const timeStr = allDay
      ? 'All day'
      : new Date(e.start.dateTime).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    const badge = e.hangoutLink
      ? '<span class="event-badge">Meet</span>'
      : (e.location || '').toLowerCase().includes('zoom.us')
        ? '<span class="event-badge">Zoom</span>'
        : '';
    return `
      <li class="event-item">
        <span class="event-time${allDay ? ' all-day' : ''}">${escHtml(timeStr)}</span>
        <span class="event-dot" style="background:${escHtml(e._calColor)}"></span>
        <span class="event-name">${escHtml(e.summary || '(no title)')}</span>
        ${badge}
      </li>`;
  }).join('');
}

async function loadCalendar() {
  const el = document.getElementById('event-list');
  if (!GCAL_CLIENT_ID) {
    el.innerHTML = '<li class="empty">Add your Google Client ID to <code>app.js</code> to enable calendar.</li>';
    return;
  }
  if (!gcalTokenValid()) {
    el.innerHTML = '<li style="padding:4px 0"><button class="gcal-connect-btn" id="gcal-btn">Connect Google Calendar</button></li>';
    document.getElementById('gcal-btn').addEventListener('click', () => {
      requestGcalToken(resp => {
        if (resp.access_token) loadCalendar();
        else el.innerHTML = '<li class="error">Google sign-in failed or was cancelled.</li>';
      });
    });
    return;
  }
  el.innerHTML = '<li class="loading">Loading meetings…</li>';
  try {
    const events = await fetchTodayEvents();
    renderEvents(events);
  } catch(e) {
    if (e.message === 'gcal_expired') {
      el.innerHTML = '<li style="padding:4px 0"><button class="gcal-connect-btn" id="gcal-btn">Reconnect Google Calendar</button></li>';
      document.getElementById('gcal-btn').addEventListener('click', () => {
        requestGcalToken(resp => { if (resp.access_token) loadCalendar(); });
      });
    } else {
      el.innerHTML = `<li class="error">Calendar error: ${escHtml(e.message)}</li>`;
    }
  }
}

// ── Init ──────────────────────────────────────────────
if (!hasToken()) {
  document.getElementById('token-modal-placeholder').innerHTML = tokenModalHTML();
  showTokenModal(() => loadTasks());
}

loadTasks();
loadPapers();
loadCalendar();
</script>
</body>
</html>
