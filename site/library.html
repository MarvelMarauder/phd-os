<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhD OS — Library</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav id="nav"></nav>

<main>
  <p class="page-title">Library</p>
  <p class="page-sub">Add papers via DOI · browse your collection · track by stream</p>

  <!-- ── Quick Add ──────────────────────────────────── -->
  <section>
    <h2>Quick Add</h2>
    <div class="doi-form" id="doi-form">
      <div class="doi-input-row">
        <input class="doi-input" type="text" id="doi-input"
               placeholder="Paste a DOI or URL (doi.org/…, dl.acm.org/…)…"
               autocomplete="off" spellcheck="false">
        <button class="btn btn-primary" id="doi-lookup-btn">Look up</button>
      </div>
      <div id="doi-status"></div>

      <div class="doi-fields hidden" id="doi-fields">
        <div class="form-row">
          <div class="form-field" style="flex:3">
            <label class="form-label">Title</label>
            <input class="form-input" type="text" id="f-title">
          </div>
          <div class="form-field" style="flex:1">
            <label class="form-label">Year</label>
            <input class="form-input" type="text" id="f-year" style="max-width:90px">
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Authors <span class="form-hint">(semicolon-separated: Last, First; Last2, First2)</span></label>
          <input class="form-input" type="text" id="f-authors" placeholder="Smith, John; Doe, Jane">
        </div>
        <div class="form-row">
          <div class="form-field" style="flex:2">
            <label class="form-label">Journal / Venue</label>
            <input class="form-input" type="text" id="f-journal">
          </div>
          <div class="form-field" style="flex:1">
            <label class="form-label">Stream</label>
            <select class="form-input" id="f-stream">
              <option value="">— none —</option>
              <option value="ai-companions">AI Companions</option>
              <option value="judgy-ai">JudgyAI</option>
              <option value="general-is">General IS</option>
            </select>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label">Topic <span class="form-hint">(specific concept — e.g. social presence, trust, anthropomorphism)</span></label>
          <input class="form-input" type="text" id="f-topic" placeholder="anthropomorphism">
        </div>
        <div class="form-field">
          <label class="form-label">Related working papers</label>
          <div class="related-list" id="f-related"></div>
        </div>
        <div class="form-field">
          <label class="form-label">
            One-sentence thought
            <span class="form-hint" id="thoughts-count">0 / 200</span>
          </label>
          <textarea class="form-input" id="f-thoughts" rows="2"
                    maxlength="200"
                    placeholder="Why does this paper matter to your work?"></textarea>
        </div>

        <div class="doi-actions">
          <span class="doi-doi-display" id="f-doi-display"></span>
          <button class="btn btn-primary" id="doi-copy-btn">Copy frontmatter</button>
        </div>
        <div class="doi-copy-hint">
          Paste the copied YAML into a new note inside
          <code>100 Research/Source Papers/</code> and push to main.
        </div>
      </div>
    </div>
  </section>

  <!-- ── Your Library ───────────────────────────────── -->
  <section>
    <h2>Your Library <span class="section-count" id="lib-count"></span></h2>
    <div class="rc-chips" id="lib-filters"></div>
    <div id="lib-list"><p class="loading">Loading…</p></div>
  </section>
</main>

<script src="app.js"></script>
<script>
document.getElementById('nav').innerHTML = navHTML('library');
initSettings();

const STREAM_META = {
  'ai-companions': { label: 'AI Companions', cls: 'stream-aic' },
  'judgy-ai':      { label: 'JudgyAI',       cls: 'stream-jai' },
  'general-is':    { label: 'General IS',    cls: 'stream-gis' },
};

// ── DOI / Quick Add ──────────────────────────────────

let activeDoi = '';
let workingPapers = [];

async function loadWorkingPapers() {
  try {
    const data = await fetch('papers.json').then(r => r.json());
    workingPapers = (data.papers || []).filter(p => p.status === 'active').map(p => p.title);
  } catch(e) { workingPapers = []; }
  renderRelatedCheckboxes([]);
}

function renderRelatedCheckboxes(checked) {
  const el = document.getElementById('f-related');
  if (!workingPapers.length) {
    el.innerHTML = '<span class="form-hint">No active working papers found.</span>';
    return;
  }
  el.innerHTML = workingPapers.map(title => {
    const id  = 'rel-' + title.replace(/\W+/g, '_');
    const chk = checked.includes(title) ? ' checked' : '';
    return `<label class="related-chip">
      <input type="checkbox" value="${escHtml(title)}"${chk}>
      ${escHtml(title)}
    </label>`;
  }).join('');
}

function extractDoi(raw) {
  const m = raw.trim().match(/\b(10\.\d{4,}\/[^\s"'<>]+)/);
  return m ? m[1] : null;
}

function stripXml(s) {
  return (s || '').replace(/<[^>]+>/g, '').trim();
}

async function doiLookup() {
  const raw = document.getElementById('doi-input').value;
  const doi = extractDoi(raw);
  const statusEl = document.getElementById('doi-status');
  const fieldsEl = document.getElementById('doi-fields');

  if (!doi) {
    statusEl.innerHTML = '<p class="error" style="margin-top:6px">Could not find a DOI in that input.</p>';
    return;
  }

  statusEl.innerHTML = '<p class="loading" style="margin-top:6px">Looking up…</p>';
  fieldsEl.classList.add('hidden');

  try {
    const r = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`);
    if (!r.ok) throw new Error('not_found');
    const { message: m } = await r.json();

    const title   = (m.title || [])[0] || '';
    const authors = (m.author || []).map(a => [a.family, a.given].filter(Boolean).join(', ')).join('; ');
    const journal = (m['container-title'] || [])[0] || (m['short-container-title'] || [])[0] || '';
    const parts   = (m.published?.['date-parts'] || [[]])[0];
    const year    = parts[0] ? String(parts[0]) : '';

    prefillForm({ title, authors, journal, year, doi: m.DOI || doi });
    statusEl.innerHTML = '';
  } catch(e) {
    statusEl.innerHTML = '<p class="error" style="margin-top:6px">DOI not found — try editing the fields manually.</p>';
    prefillForm({ title:'', authors:'', journal:'', year:'', doi });
  }
}

function prefillForm({ title, authors, journal, year, doi, topic = '' }) {
  document.getElementById('f-title').value   = title;
  document.getElementById('f-authors').value = authors;
  document.getElementById('f-journal').value = journal;
  document.getElementById('f-year').value    = year;
  document.getElementById('f-topic').value   = topic;
  document.getElementById('f-doi-display').textContent = doi ? `DOI: ${doi}` : '';
  activeDoi = doi || '';
  renderRelatedCheckboxes([]);
  document.getElementById('doi-fields').classList.remove('hidden');
  document.getElementById('doi-status').innerHTML = '';
  setTimeout(() => {
    document.getElementById('doi-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

document.getElementById('doi-lookup-btn').addEventListener('click', doiLookup);
document.getElementById('doi-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doiLookup();
});

document.getElementById('f-thoughts').addEventListener('input', function() {
  document.getElementById('thoughts-count').textContent = `${this.value.length} / 200`;
});

document.getElementById('doi-copy-btn').addEventListener('click', () => {
  const title   = document.getElementById('f-title').value.trim();
  const authors = document.getElementById('f-authors').value.trim()
                    .split(';').map(s => s.trim()).filter(Boolean);
  const journal = document.getElementById('f-journal').value.trim();
  const year    = document.getElementById('f-year').value.trim();
  const stream  = document.getElementById('f-stream').value;
  const topic   = document.getElementById('f-topic').value.trim();
  const thoughts= document.getElementById('f-thoughts').value.trim();
  const related = [...document.querySelectorAll('#f-related input:checked')].map(c => c.value);

  const authorsYaml = authors.length
    ? '\nauthors:\n' + authors.map(a => `  - ${a}`).join('\n')
    : '\nauthors: []';
  const relatedYaml = related.length
    ? '\nrelated-papers:\n' + related.map(r => `  - "${r}"`).join('\n')
    : '\nrelated-papers: []';

  const yaml = `---
title: "${title.replace(/"/g, '\\"')}"${authorsYaml}
journal: "${journal}"
year: ${year || 'null'}
doi: ${activeDoi || 'null'}
stream: ${stream || 'null'}
topic: "${topic.replace(/"/g, '\\"')}"${relatedYaml}
thoughts: "${thoughts.replace(/"/g, '\\"')}"
---
`;

  navigator.clipboard.writeText(yaml).then(() => {
    const btn = document.getElementById('doi-copy-btn');
    btn.textContent = 'Copied ✓';
    btn.style.background = 'var(--accent)';
    setTimeout(() => { btn.textContent = 'Copy frontmatter'; btn.style.background = ''; }, 2500);
  });
});

// ── Pre-fill from Discover page (URL params) ──────────
(function checkUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const title = params.get('title');
  if (title || params.get('doi')) {
    // Restore authors from "First Last" → "Last, First" if they look like OpenAlex format
    // (just pass through as-is; user can edit)
    prefillForm({
      title:   title || '',
      authors: params.get('authors') || '',
      journal: params.get('journal') || '',
      year:    params.get('year') || '',
      doi:     params.get('doi') || '',
    });
    // Clean the URL so refreshing doesn't re-fill
    history.replaceState({}, '', 'library.html');
  }
})();

// ── Library ───────────────────────────────────────────

let libFilter = null;

function streamPill(stream) {
  if (!stream) return '';
  const m = STREAM_META[stream];
  if (!m) return `<span class="lit-stream-badge">${escHtml(stream)}</span>`;
  return `<span class="lit-stream-badge ${m.cls}">${escHtml(m.label)}</span>`;
}

function renderLibFilters(papers) {
  const el = document.getElementById('lib-filters');
  const streams = [...new Set(papers.map(p => p.stream).filter(Boolean))];
  if (!streams.length) { el.innerHTML = ''; return; }
  const opts = [{ key: null, label: 'All' }, ...streams.map(s => ({ key: s, label: (STREAM_META[s]||{}).label || s }))];
  el.innerHTML = opts.map(o =>
    `<button class="rc-chip${o.key === libFilter ? ' active' : ''}" data-key="${o.key ?? ''}">${escHtml(o.label)}</button>`
  ).join('');
  el.querySelectorAll('.rc-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      libFilter = btn.dataset.key || null;
      renderLibFilters(papers);
      renderLib(papers);
    });
  });
}

function renderLib(papers) {
  const el = document.getElementById('lib-list');
  const visible = libFilter ? papers.filter(p => p.stream === libFilter) : papers;
  document.getElementById('lib-count').textContent = papers.length || '';

  if (!visible.length) {
    el.innerHTML = papers.length
      ? '<p class="empty">No papers in this stream yet.</p>'
      : `<p class="empty">No papers yet — use Quick Add above, then push to main.</p>`;
    return;
  }

  el.innerHTML = visible.map(p => {
    const href = p.doi ? `https://doi.org/${p.doi}` : null;
    const titleHtml = href
      ? `<a class="lit-title" href="${escHtml(href)}" target="_blank" rel="noopener">${escHtml(p.title)}</a>`
      : `<span class="lit-title">${escHtml(p.title)}</span>`;
    const authorsStr = (p.authors || []).slice(0, 4).join('; ') + (p.authors?.length > 4 ? ' et al.' : '');
    const related = (p.related_papers || []);
    const relatedHtml = related.length
      ? `<div class="lit-related">
           <span class="lit-related-label">Related to:</span>
           ${related.map(r => `<span class="lit-related-chip">${escHtml(r)}</span>`).join('')}
         </div>`
      : '';

    return `
      <div class="lit-card">
        <div class="lit-card-top">
          ${streamPill(p.stream)}
          ${p.topic ? `<span class="lit-topic-pill">${escHtml(p.topic)}</span>` : ''}
          <span class="lit-meta">${escHtml(p.journal || '')}${p.journal && p.year ? ' · ' : ''}${p.year || ''}</span>
        </div>
        ${titleHtml}
        ${authorsStr ? `<div class="lit-authors">${escHtml(authorsStr)}</div>` : ''}
        ${p.thoughts ? `<p class="lit-thoughts">${escHtml(p.thoughts)}</p>` : ''}
        ${p.snippet  ? `<p class="lit-snippet">${escHtml(p.snippet)}</p>`   : ''}
        ${relatedHtml}
      </div>`;
  }).join('');
}

async function loadLib() {
  const el = document.getElementById('lib-list');
  try {
    const data = await fetch('lit.json').then(r => r.json());
    const papers = data.papers || [];
    renderLibFilters(papers);
    renderLib(papers);
  } catch(e) {
    el.innerHTML = '<p class="error">Could not load lit.json</p>';
  }
}

// ── Init ─────────────────────────────────────────────
loadWorkingPapers();
loadLib();
</script>
</body>
</html>
